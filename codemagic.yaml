workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain and certificates
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.chippin.chippin \
            --type IOS_APP_STORE \
            --platform IOS \
            --strict-match-identifier \
            --create
          keychain add-certificates
      - name: Install provisioning profile from repo
        script: |
          # Remove any auto-downloaded profiles
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision
          # Install our profile with Sign in with Apple capability
          PROFILE_UUID=$(security cms -D -i chippin/ios/profiles/Chippin_Distribution.mobileprovision | grep -A1 UUID | grep string | sed 's/.*<string>//' | sed 's/<\/string>.*//')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp chippin/ios/profiles/Chippin_Distribution.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Installed profile with UUID: ${PROFILE_UUID}"
      - name: Set up code signing settings on Xcode project
        script: |
          cd chippin/ios
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          cd chippin
          flutter packages pub get
      - name: Build IPA
        script: |
          cd chippin
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - chippin/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers
      email:
        recipients:
          - goldkazyna@gmail.com
        notify:
          success: true
          failure: true
