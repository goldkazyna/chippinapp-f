workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.chippin.chippin
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Delete old API profiles and fetch fresh
        script: |
          # List and delete all existing App Store profiles for our bundle ID via API
          app-store-connect list-profiles \
            --bundle-id-identifier com.chippin.chippin \
            --profile-type IOS_APP_STORE \
            --json | python3 -c "
          import json, sys, subprocess
          profiles = json.load(sys.stdin)
          for p in profiles:
              pid = p.get('id')
              name = p.get('attributes', {}).get('name', '')
              print(f'Deleting profile: {name} ({pid})')
              subprocess.run(['app-store-connect', 'delete-profile', pid])
          " || true
          # Now fetch fresh - will create new profile with current capabilities
          app-store-connect fetch-signing-files com.chippin.chippin \
            --type IOS_APP_STORE \
            --platform IOS \
            --strict-match-identifier \
            --create
          keychain add-certificates
      - name: List fetched profiles
        script: |
          echo "=== Profiles ==="
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            echo "--- $(basename "$f") ---"
            security cms -D -i "$f" | grep -A1 "Name\|com.apple.developer"
          done
      - name: Set up code signing settings on Xcode project
        script: |
          cd chippin/ios
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          cd chippin
          flutter packages pub get
      - name: Build IPA
        script: |
          cd chippin
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - chippin/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers
      email:
        recipients:
          - goldkazyna@gmail.com
        notify:
          success: true
          failure: true
